name: 🚀 Auto Deploy # Updatet automatisch alles auf dem Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/Ayoub
            ./deploy_scoutplan.sh
            if [ -d /opt/Ayoub/ScoutX ]; then
              cd /opt/Ayoub/ScoutX
            elif [ -d /opt/Ayoub/scoutx ]; then
              cd /opt/Ayoub/scoutx
            elif [ -d /opt/Ayoub/scoutplan ]; then
              cd /opt/Ayoub/scoutplan
            fi
            git fetch origin main
            git reset --hard origin/main
            docker compose --profile prod build --no-cache prod
            docker compose --profile prod up -d --force-recreate prod
            sleep 2
            INDEX_HTML="$(curl -fsS http://127.0.0.1:5580/)"
            ASSET_PATH="$(printf "%s" "$INDEX_HTML" | grep -o '/assets/index-[^"]*\.js' | head -n 1)"
            test -n "$ASSET_PATH"
            curl -fsS "http://127.0.0.1:5580${ASSET_PATH}" | grep -q "Bundesland"
