services:
  # Development mit Hot Reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    network_mode: "host"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
    environment:
      - OLLAMA_HOST=http://localhost:11434/
    profiles:
      - dev

  # Production mit Nginx
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "host"
    environment:
      - OLLAMA_HOST=http://localhost:11434/
    restart: always
