services:
  # Development mit Hot Reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - dev

  # Production mit Nginx
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - prod
