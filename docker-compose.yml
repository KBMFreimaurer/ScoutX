services:
  # Development mit Hot Reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    network_mode: "host"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
    environment:
      - OLLAMA_HOST=http://localhost:11434/
      - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY:-}
      - VITE_GOOGLE_MAPS_STRICT=${VITE_GOOGLE_MAPS_STRICT:-true}
      - VITE_ADAPTER_TOKEN=${ADAPTER_TOKEN:-scoutx-internal-2026}
      - VITE_ADAPTER_TIMEOUT_MS=${VITE_ADAPTER_TIMEOUT_MS:-75000}
    profiles:
      - dev

  # Production mit Nginx
  prod:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_GOOGLE_MAPS_STRICT: ${VITE_GOOGLE_MAPS_STRICT:-true}
        VITE_ADAPTER_TOKEN: ${ADAPTER_TOKEN:-scoutx-internal-2026}
        VITE_ADAPTER_TIMEOUT_MS: ${VITE_ADAPTER_TIMEOUT_MS:-75000}
    network_mode: "host"
    environment:
      - OLLAMA_HOST=http://localhost:11434/
      - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY:-}
      - VITE_GOOGLE_MAPS_STRICT=${VITE_GOOGLE_MAPS_STRICT:-true}
    depends_on:
      adapter:
        condition: service_healthy
    restart: always
    profiles:
      - prod

  # Externer Adapter-Service für reale Spieldaten
  adapter:
    build:
      context: .
      dockerfile: adapter-service/Dockerfile
    network_mode: "host"
    environment:
      - ADAPTER_HOST=0.0.0.0
      - ADAPTER_PORT=8787
      - CORS_ORIGIN=*
      - ADAPTER_DATA_FILE=/app/data/games.sample.json
      - ADAPTER_STORE_FILE=/app/data/games.store.json
      - ADAPTER_IMPORT_DIR=/app/imports
      - ADAPTER_ALIASES_FILE=/app/data/team-aliases.json
      - ADAPTER_REFRESH_INTERVAL_SEC=300
      - ADAPTER_AUTO_REFRESH_WEEK=true
      - ADAPTER_WEEK_REFRESH_TTL_SEC=300
      - ADAPTER_WEEK_COMMAND_TIMEOUT_MS=60000
      - FUSSBALLDE_REQUEST_TIMEOUT_MS=20000
      - ADAPTER_EXPORT_COMMAND=node /app/scripts/fetch-week.fussballde.mjs
      - ADAPTER_TOKEN=${ADAPTER_TOKEN:-scoutx-internal-2026}
      # - ADAPTER_WEEK_SOURCE_URL_TEMPLATE=https://example.com/api/games?from={fromDate}&to={toDate}&kreis={kreisId}&jugend={jugendId}
      # - ADAPTER_WEEK_SOURCE_TOKEN=change-me
      # - ADAPTER_REMOTE_URL=https://example.com/api/games
      # - ADAPTER_REMOTE_TOKEN=change-me
    volumes:
      - ./adapter-service/data:/app/data
      - ./adapter-service/imports:/app/imports
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then((r)=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    profiles:
      - dev
      - prod
