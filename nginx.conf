server {
    listen 5580;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self)" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy für Ollama (Qwen LLM)
    location /ollama/ {
        proxy_pass http://localhost:11434/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Reverse Proxy für ScoutX Adapter (reale Spieldaten)
    location /api/ {
        # host.docker.internal ist auf Linux-Hosts häufig nicht verfügbar.
        # Mit network_mode=host zeigt 127.0.0.1 direkt auf den Host-Adapter.
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
